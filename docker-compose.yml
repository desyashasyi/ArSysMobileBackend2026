version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: dev
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    restart: always
    container_name: ArSysMobile-app
    working_dir: /var/www
    ports:
      - "8000:8000"
      - "5175:5173"
    volumes:
      - .:/var/www
      - .docker/php/supervisord.conf:/etc/supervisord.conf
      - .docker/php/supervisor.conf:/etc/supervisor/conf.d/supervisor.conf
    depends_on:
      - mysql
      - redis
    networks:
      - WebFPTE

  # Nginx (Docker Internal)
  nginx:
    image: nginx:alpine
    container_name: ArSysMobile-nginx
    restart: always
    ports:
      - "8081:80" # Port 8081 agar tidak bentrok dengan Nginx Ubuntu
    volumes:
      - .:/var/www
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - WebFPTE

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ArSysMobile-mysql
    restart: always
    # Menggunakan mysql_native_password agar koneksi Laravel/Flutter lebih lancar
    command: mysqld --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3307:3306" # Akses dari luar (DBeaver) lewat 3307
    volumes:
      - ./.docker/db/data:/var/lib/mysql
      - ./.docker/db/sql:/docker-entrypoint-initdb.d
    networks:
      - WebFPTE

  # Redis
  redis:
    image: redis:alpine
    container_name: ArSysMobile-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - WebFPTE

volumes:
  redis_data:

networks:
  WebFPTE:
    driver: bridge
